name: Karate API Automation CI/CD

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run smoke tests
        run: mvn clean test -Dtest=SmokeTestRunner -Dkarate.env=${{ github.event.inputs.environment || 'dev' }}
      
      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            target/smoke-reports/
            target/karate-reports/
          retention-days: 30

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run regression tests
        run: mvn clean test -Dtest=RegressionTestRunner -Dkarate.env=${{ github.event.inputs.environment || 'dev' }}
      
      - name: Upload regression test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: |
            target/regression-reports/
            target/karate-reports/
          retention-days: 30

  parallel-execution:
    name: Parallel Test Execution
    runs-on: ubuntu-latest
    needs: smoke-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run all tests in parallel
        run: mvn clean test -Dtest=ParallelRunner -Dkarate.env=${{ github.event.inputs.environment || 'dev' }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parallel-test-results
          path: |
            target/karate-reports/
            target/surefire-reports/
          retention-days: 30

  negative-tests:
    name: Negative Test Scenarios
    runs-on: ubuntu-latest
    needs: smoke-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run negative tests
        run: mvn clean test -Dtest=NegativeTestRunner -Dkarate.env=${{ github.event.inputs.environment || 'dev' }}
      
      - name: Upload negative test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: negative-test-results
          path: |
            target/negative-reports/
            target/karate-reports/
          retention-days: 30

  test-summary:
    name: Test Summary Report
    runs-on: ubuntu-latest
    needs: [smoke-tests, regression-tests, parallel-execution, negative-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Display test summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Environment: ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "### Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "### Run number: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test suites executed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "Check individual job results for detailed reports." >> $GITHUB_STEP_SUMMARY

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build project and install dependencies
        run: mvn clean install -DskipTests
      
      - name: Verify dependencies
        run: mvn dependency:tree
